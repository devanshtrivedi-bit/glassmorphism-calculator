<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
</head>
<body>
    <div class="background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="calculator">
        <div class="display">
            <div class="previous-operand" id="previous-operand"></div>
            <div class="current-operand" id="current-operand">0</div>
        </div>
        <div class="buttons">
            <!-- Row 1 -->
            <button class="btn btn-sci" data-value="sin(">sin</button>
            <button class="btn btn-sci" data-value="cos(">cos</button>
            <button class="btn btn-sci" data-value="tan(">tan</button>
            <button class="btn btn-action" data-action="clear">AC</button>
            <button class="btn btn-action" data-action="delete">DEL</button>

            <!-- Row 2 -->
            <button class="btn btn-sci" data-value="^2">x²</button>
            <button class="btn btn-sci" data-value="^">xʸ</button>
            <button class="btn btn-sci" data-value="sqrt(">√</button>
            <button class="btn btn-sci" data-value="(">(</button>
            <button class="btn btn-sci" data-value=")">)</button>

            <!-- Row 3 -->
            <button class="btn btn-sci" data-value="log10(">log</button>
            <button class="btn btn-sci" data-value="log(">ln</button>
            <button class="btn btn-sci" data-value="pi">π</button>
            <button class="btn btn-sci" data-value="e">e</button>
            <button class="btn btn-operator" data-value="/">÷</button>

            <!-- Row 4 -->
            <button class="btn" data-value="7">7</button>
            <button class="btn" data-value="8">8</button>
            <button class="btn" data-value="9">9</button>
            <button class="btn btn-sci" data-value="%">%</button>
            <button class="btn btn-operator" data-value="*">×</button>

            <!-- Row 5 -->
            <button class="btn" data-value="4">4</button>
            <button class="btn" data-value="5">5</button>
            <button class="btn" data-value="6">6</button>
            <button class="btn btn-sci" data-value="!">x!</button>
            <button class="btn btn-operator" data-value="-">-</button>

            <!-- Row 6 -->
            <button class="btn" data-value="1">1</button>
            <button class="btn" data-value="2">2</button>
            <button class="btn" data-value="3">3</button>
            <button class="btn btn-sci" data-value="^-1">1/x</button>
            <button class="btn btn-operator" data-value="+">+</button>

            <!-- Row 7 -->
            <button class="btn" data-action="negate">+/-</button>
            <button class="btn" data-value="0">0</button>
            <button class="btn" data-value=".">.</button>
            <button class="btn btn-equal" data-action="calculate" style="grid-column: span 2;">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
